<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lifynk</title>
    <link  href="../assets/favicon.png" rel="icon">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Row layout for country + number ── */
        .input-field-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Country box: same height/border/radius/bg as .input-field input */
        .country-box {
            flex: 0 0 115px;
            width: 115px;
            height: 51px;               /* matches 14+14 padding + 15px font line-height */
            padding: 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background: #f8fafc;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;         /* override .input-field position:relative — fine */
        }
        .country-box:focus-within {
            background: white;
            border-color: #0d9488;
            box-shadow: 0 0 0 4px rgba(13,148,136,0.1);
        }
        /* Kill the .input-field i absolute positioning inside country-box */
        .country-box i { display: none; }

        .country-code-select {
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            width: 100%;
            padding: 0;
            -webkit-appearance: none;
            appearance: none;
        }

        /* Number box: fills remaining width, input inherits full styles */
        .number-box {
            flex: 1;
            min-width: 0;
        }

        /* recaptcha tiny */
        #recaptcha-container {
            transform: scale(0.6);
            transform-origin: left center;
            height: 26px;
            overflow: hidden;
            margin: 2px 0;
        }
        /* Lock left image height so it never resizes between tabs */
        .login-container { align-items: stretch; }
        .login-image {
            position: sticky !important;
            top: 0 !important;
            height: 100vh !important;
            flex-shrink: 0 !important;
            align-self: flex-start !important;
        }
        .login-form-section { min-height: 100vh; }
        .grecaptcha-badge {
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 0 !important;
            height: 0 !important;
            position: absolute !important;
        }

        /* ── Admin mode (hidden by default) ── */
        .admin-mode-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(13,148,136,0.08);
            border: 1px solid rgba(13,148,136,0.2);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            color: #0d9488;
            margin-bottom: 16px;
            animation: fadeInAdmin 0.3s ease;
        }
        .admin-mode-indicator.visible { display: flex; }
        .admin-mode-indicator i { font-size: 13px; }
        .admin-mode-indicator .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #0d9488;
            animation: pulse-admin 1.5s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse-admin {
            0%,100% { box-shadow: 0 0 0 0 rgba(13,148,136,0.5); }
            50%      { box-shadow: 0 0 0 5px rgba(13,148,136,0); }
        }
        @keyframes fadeInAdmin {
            from { opacity:0; transform: translateY(-6px); }
            to   { opacity:1; transform: translateY(0); }
        }
        body.admin-mode .btn-submit {
            background: linear-gradient(135deg, #0f172a, #1e293b) !important;
            box-shadow: 0 4px 20px rgba(15,23,42,0.3) !important;
        }
    </style>
</head>
<body>
    
    <div class="login-container">
        
        <div class="login-image">
            <div class="image-overlay">
                <div class="quote-box">
                    <h2>"Every Drop Counts."</h2>
                    <p>Join 10,000+ donors saving lives daily.</p>
                </div>
            </div>
        </div>

        <div class="login-form-section">
            <div class="form-wrapper">
                
                <div class="form-header">
                    <img src="../assets/logo.png" alt="Lifynk Logo" class="brand-logo">
                    <a href="../pages/home.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>                
                    <h2 class="brand-title" id="formTitle">Welcome Back</h2>
                    <p id="formSubtitle">Please login to your account</p>
                </div>

                <div class="admin-mode-indicator" id="adminIndicator">
                    <span class="dot"></span>
                    <i class="fa-solid fa-shield-halved"></i>
                    Secure Admin Access
                </div>

                <div class="role-tabs" id="roleTabs">
                    <button class="tab active" onclick="switchTab(event, 'donor')"><i class="fa-solid fa-droplet"></i> Donor</button>
                    <button class="tab" onclick="switchTab(event, 'recipient')"><i class="fa-solid fa-user-injured"></i>Recipient</button>
                    <button class="tab" onclick="switchTab(event, 'hospital')"><i class="fa-solid fa-hospital"></i>Hospital</button>
                    <button class="tab" onclick="switchTab(event, 'ngo')"><i class="fa-solid fa-hand-holding-heart"></i>NGO</button>
                    <button class="tab" onclick="switchTab(event, 'bloodbank')"><i class="fa-solid fa-flask-vial"></i>Blood Bank</button>
                </div>

                <form class="login-form">
                    <input type="hidden" id="userRole" value="donor">
                    <div class="input-group">
                        <label for="identity" id="identity-label">Mobile Number</label>
                        <div class="input-field-row" id="identity-field-row">
                            <div class="input-field country-box" id="country-code-box">
                                <select class="country-code-select" id="country-code">
                                    <option value="+91">🇮🇳 +91</option>
                                    <option value="+1">🇺🇸 +1</option>
                                    <option value="+44">🇬🇧 +44</option>
                                    <option value="+971">🇦🇪 +971</option>
                                    <option value="+61">🇦🇺 +61</option>
                                    <option value="+81">🇯🇵 +81</option>
                                    <option value="+49">🇩🇪 +49</option>
                                    <option value="+33">🇫🇷 +33</option>
                                    <option value="+65">🇸🇬 +65</option>
                                    <option value="+27">🇿🇦 +27</option>
                                </select>
                            </div>
                            <div class="input-field number-box">
                                <i class="fa-solid fa-user" id="identity-icon"></i>
                                <input type="text" id="identity" placeholder="Enter your 10-digit number" required>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••">
                            <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>
                    <div id="recaptcha-container"></div> 
                    <button type="submit" class="btn-submit" id="submitBtn">Login Securely</button>

                    <p class="register-link" id="registerLink">
                        New to Lifynk? <a href="signup.html">Create an Account</a>
                    </p>
                </form>

            </div>
        </div>
    </div>

    <script>

        // ── Admin mode state ─────────────────────────────────────
        let adminMode = false;
        function setAdminMode(on) {
            adminMode = on;
            document.body.classList.toggle('admin-mode', on);
            document.getElementById('adminIndicator').classList.toggle('visible', on);
            document.getElementById('roleTabs').style.display    = on ? 'none' : '';
            document.getElementById('registerLink').style.display = on ? 'none' : '';
            document.getElementById('formTitle').textContent      = on ? 'Admin Access' : 'Welcome Back';
            document.getElementById('formSubtitle').textContent   = on ? 'Authorised personnel only' : 'Please login to your account';
            document.getElementById('submitBtn').textContent      = on ? 'Access Dashboard' : 'Login Securely';
            document.getElementById('userRole').value             = on ? 'admin' : 'donor';

            const label = document.getElementById('identity-label');
            const input = document.getElementById('identity');
            const icon  = document.getElementById('identity-icon');
            const ccBox = document.getElementById('country-code-box');
            const fRow  = document.getElementById('identity-field-row');

            if (on) {
                input.type = 'email';
                input.removeAttribute('pattern');
                input.placeholder = 'Admin email address';
                label.textContent = 'Email Address';
                icon.className    = 'fa-solid fa-user-shield';
                if (ccBox) ccBox.style.display = 'none';
                if (fRow)  fRow.style.display  = 'block';
                input.focus();
            } else {
                input.type = 'tel';
                input.setAttribute('pattern', '[0-9]{10}');
                input.placeholder = 'Enter 10-digit number';
                label.textContent = 'Mobile Number';
                icon.className    = 'fa-solid fa-phone';
                if (ccBox) ccBox.style.display = 'flex';
                if (fRow)  fRow.style.display  = 'flex';
            }
        }

        // FIX 1: Robust Tab Switching
        function switchTab(event, role) {
            if (adminMode) return; // Prevent tab switching in admin mode
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const label = document.getElementById('identity-label');
            const input = document.getElementById('identity');
            const icon = document.getElementById('identity-icon');
            const roleInput = document.getElementById('userRole');

            // Store current role
            roleInput.value = role;
            input.value = ""; 

            if(role === 'donor' || role === 'recipient') {
                // INDIVIDUALS: Mobile Logic
                input.type = "tel"; 
                input.setAttribute("pattern", "[0-9]{10}");
                label.innerText = "Mobile Number";
                input.placeholder = "Enter 10-digit number";
                icon.className = role === 'donor' ? "fa-solid fa-phone" : "fa-solid fa-user-injured";
            } else {
                // ORGANIZATIONS: Email Logic
                input.type = "email";
                input.removeAttribute("pattern");
                icon.className = role === 'hospital' ? "fa-solid fa-hospital" : 
                                role === 'ngo' ? "fa-solid fa-hand-holding-heart" : "fa-solid fa-flask-vial";
                
                if (role === 'hospital') {
                    label.innerText = "Hospital Email ID";
                    input.placeholder = "Enter official email id";
                } else if(role === 'ngo'){
                    label.innerText = "NGO Email ID";
                    input.placeholder = "Enter official email id";
                } else {
                    label.innerText = "Blood Bank Email ID";
                    input.placeholder = "Enter official email id";
                }
            }
            // FOCUS IMPROVEMENT: Cursor box mein move ho jayega
            const passwordGroup = document.getElementById('password').closest('.input-group');
            const countryBox = document.getElementById('country-code-box');
            const fieldRow   = document.getElementById('identity-field-row');
            if (role === 'donor' || role === 'recipient') {
                passwordGroup.style.display = 'block';
                if (countryBox) countryBox.style.display = 'flex';
                if (fieldRow)   fieldRow.style.display   = 'flex';
            } else {
                passwordGroup.style.display = 'block';
                if (countryBox) countryBox.style.display = 'none';
                if (fieldRow)   fieldRow.style.display   = 'block';
            }
            input.focus();
        }

        // FIX 2: Password Toggle Logic
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }

        // --- LOGIN ANIMATIONS & SUBMISSION ---
        document.addEventListener('DOMContentLoaded', () => {
            // Hide password on load since donor is default tab
            const passwordGroup = document.getElementById('password').closest('.input-group');
            passwordGroup.style.display = 'block';
            const ccBox = document.getElementById('country-code-box');
            if (ccBox) ccBox.style.display = 'flex';
            const fieldRow = document.getElementById('identity-field-row');
            if (fieldRow) fieldRow.style.display = 'flex';
            // 1. Error Shake Logic
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('invalid', (e) => {
                    e.preventDefault();
                    input.classList.remove('shake-error');
                    void input.offsetWidth; // Trigger reflow
                    input.classList.add('shake-error');
                });
                input.addEventListener('input', () => input.classList.remove('shake-error'));
            });

            // Shift + Click toggles admin mode
            document.getElementById('submitBtn').addEventListener('click', (e) => {
                if (e.shiftKey) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    setAdminMode(!adminMode);
                }
            }, true);

            // 2. Form Submission & Loading State
            const loginForm = document.querySelector('.login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    const btn = this.querySelector('.btn-submit');
                    
                    if (!this.checkValidity()) {
                        e.preventDefault();
                        return;
                    }

                    // Show Loading Spinner
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                    btn.style.pointerEvents = 'none';
                    btn.style.opacity = '0.8';
                });
            }
        });
    </script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
